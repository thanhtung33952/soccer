<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soccer Team Divider</title>
    <style>
      :root {
        --bg-1: #052e16;
        --bg-2: #14532d;
        --bg-3: #064e3b;
        --card: rgba(255, 255, 255, 0.95);
        --text: #1f2937;
        --muted: #6b7280;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
      }

      .field-overlay {
        position: fixed;
        inset: 0;
        opacity: 0.12;
        pointer-events: none;
        overflow: hidden;
      }

      .line,
      .circle {
        position: absolute;
        border: 3px solid #fff;
        border-radius: 999px;
      }

      .circle.c1 {
        width: 180px;
        height: 180px;
        top: 40px;
        left: 40px;
      }

      .circle.c2 {
        width: 260px;
        height: 260px;
        top: 80px;
        right: 40px;
      }

      .circle.c3 {
        width: 120px;
        height: 120px;
        bottom: 40px;
        left: 30%;
      }

      .line.v {
        border: 0;
        border-left: 3px solid #fff;
        border-radius: 0;
        height: 100%;
        left: 50%;
        top: 0;
      }

      .circle.center {
        width: 180px;
        height: 180px;
        top: calc(50% - 90px);
        left: calc(50% - 90px);
      }

      .container {
        position: relative;
        z-index: 1;
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .title-wrap {
        text-align: center;
        margin-bottom: 24px;
      }

      .title {
        margin: 0;
        color: #fff;
        font-size: clamp(28px, 4vw, 48px);
        font-weight: 800;
      }

      .subtitle {
        margin: 10px auto 0;
        max-width: 740px;
        color: #bbf7d0;
        font-size: 16px;
      }

      .card {
        max-width: 780px;
        margin: 0 auto;
        background: var(--card);
        border-radius: 18px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
        overflow: hidden;
      }

      .card-head {
        padding: 14px 20px;
        color: #fff;
        font-weight: 700;
        font-size: 20px;
        background: linear-gradient(90deg, #16a34a, #059669);
      }

      form {
        padding: 20px;
      }

      label {
        display: block;
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 700;
      }

      input,
      textarea {
        width: 100%;
        border: 2px solid #e5e7eb;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 16px;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input:focus,
      textarea:focus {
        border-color: #16a34a;
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.16);
      }

      textarea {
        resize: vertical;
        min-height: 110px;
      }

      .hint {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .error {
        margin: 14px 0;
        background: #fef2f2;
        border: 2px solid #fecaca;
        border-radius: 12px;
        color: #dc2626;
        padding: 10px 12px;
        font-weight: 600;
        display: none;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        flex: 1;
        color: #fff;
        background: linear-gradient(90deg, #16a34a, #059669);
      }

      .reshuffle {
        color: #fff;
        background: linear-gradient(90deg, #f59e0b, #f97316);
        display: none;
      }

      .reset {
        color: #fff;
        background: linear-gradient(90deg, #9ca3af, #6b7280);
        display: none;
      }

      .lineup-title {
        color: #fff;
        text-align: center;
        font-size: 26px;
        margin: 28px 0 14px;
        font-weight: 800;
        display: none;
      }

      .teams {
        display: grid;
        grid-template-columns: repeat(1, minmax(0, 1fr));
        gap: 14px;
      }

      .team-card {
        border-radius: 16px;
        overflow: hidden;
        border: 2px solid #ddd;
        background: #fff;
      }

      .team-header {
        color: #fff;
        font-weight: 700;
        padding: 12px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .team-body {
        padding: 12px;
      }

      .player {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 9px 10px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .player:last-child {
        margin-bottom: 0;
      }

      .num {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .summary {
        margin: 18px auto 0;
        display: none;
        width: fit-content;
        color: #bbf7d0;
        background: rgba(255, 255, 255, 0.1);
        padding: 10px 16px;
        border-radius: 999px;
        font-weight: 600;
      }

      @media (min-width: 768px) {
        .teams.cols-2 {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .teams.cols-3 {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
        .teams.cols-4 {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="field-overlay">
      <div class="circle c1"></div>
      <div class="circle c2"></div>
      <div class="circle c3"></div>
      <div class="line v"></div>
      <div class="circle center"></div>
    </div>

    <div class="container">
      <div class="title-wrap">
        <h1 class="title">⚽ Soccer Team Divider ⚽</h1>
        <p class="subtitle">
          Enter your players, choose the number of teams, and divide them randomly for a fair match.
        </p>
      </div>

      <div class="card">
        <div class="card-head">Setup Your Match</div>
        <form id="teamForm">
          <label for="numTeams">🏆 Number of Teams</label>
          <input id="numTeams" type="number" min="2" max="10" placeholder="e.g. 2" />

          <label for="playerNames" style="margin-top: 14px;">👥 Player Names (separated by commas)</label>
          <textarea
            id="playerNames"
            placeholder="e.g. Messi, Ronaldo, Neymar, Mbappe, Salah"
          ></textarea>
          <p id="countHint" class="hint"></p>

          <div id="error" class="error"></div>

          <div class="actions">
            <button class="primary" type="submit">🎲 Divide Teams!</button>
            <button id="reshuffleBtn" class="reshuffle" type="button" title="Reshuffle">🔀</button>
            <button id="resetBtn" class="reset" type="button" title="Reset">🗑️</button>
          </div>
        </form>
      </div>

      <h2 id="lineupTitle" class="lineup-title">🏟️ Team Lineup</h2>
      <div id="teams" class="teams"></div>
      <div id="summary" class="summary"></div>
    </div>

    <script>
      const teamPalettes = [
        { card: "#fef2f2", border: "#f87171", head: "#ef4444", badgeBg: "#fee2e2", badgeText: "#b91c1c" },
        { card: "#eff6ff", border: "#60a5fa", head: "#3b82f6", badgeBg: "#dbeafe", badgeText: "#1d4ed8" },
        { card: "#f0fdf4", border: "#4ade80", head: "#22c55e", badgeBg: "#dcfce7", badgeText: "#15803d" },
        { card: "#fefce8", border: "#facc15", head: "#eab308", badgeBg: "#fef9c3", badgeText: "#a16207" },
        { card: "#faf5ff", border: "#c084fc", head: "#a855f7", badgeBg: "#f3e8ff", badgeText: "#7e22ce" },
        { card: "#fdf2f8", border: "#f472b6", head: "#ec4899", badgeBg: "#fce7f3", badgeText: "#be185d" },
        { card: "#eef2ff", border: "#818cf8", head: "#6366f1", badgeBg: "#e0e7ff", badgeText: "#4338ca" },
        { card: "#f0fdfa", border: "#2dd4bf", head: "#14b8a6", badgeBg: "#ccfbf1", badgeText: "#0f766e" },
        { card: "#fff7ed", border: "#fb923c", head: "#f97316", badgeBg: "#ffedd5", badgeText: "#c2410c" },
        { card: "#ecfeff", border: "#22d3ee", head: "#06b6d4", badgeBg: "#cffafe", badgeText: "#0e7490" }
      ];

      const form = document.getElementById("teamForm");
      const numTeamsInput = document.getElementById("numTeams");
      const playerNamesInput = document.getElementById("playerNames");
      const countHint = document.getElementById("countHint");
      const errorBox = document.getElementById("error");
      const teamsWrap = document.getElementById("teams");
      const lineupTitle = document.getElementById("lineupTitle");
      const summary = document.getElementById("summary");
      const reshuffleBtn = document.getElementById("reshuffleBtn");
      const resetBtn = document.getElementById("resetBtn");

      function shuffleArray(array) {
        const shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      }

      function parsePlayers(raw) {
        return raw
          .split(",")
          .map((name) => name.trim())
          .filter((name) => name.length > 0);
      }

      function updateHint() {
        const count = parsePlayers(playerNamesInput.value).length;
        countHint.textContent = count > 0 ? "📋 " + count + " player(s) entered" : "";
      }

      function showError(message) {
        if (!message) {
          errorBox.style.display = "none";
          errorBox.textContent = "";
          return;
        }
        errorBox.style.display = "block";
        errorBox.textContent = "⚠️ " + message;
      }

      function divideTeams(players, teamCount) {
        const shuffled = shuffleArray(players);
        const teams = Array.from({ length: teamCount }, () => []);
        shuffled.forEach((player, index) => {
          teams[index % teamCount].push(player);
        });
        return teams;
      }

      function gridClassByTeamCount(teamCount) {
        if (teamCount === 2) return "cols-2";
        if (teamCount === 3) return "cols-3";
        if (teamCount === 4) return "cols-4";
        return "cols-3";
      }

      function renderTeams(teams) {
        teamsWrap.innerHTML = "";
        teamsWrap.className = "teams " + gridClassByTeamCount(teams.length);

        teams.forEach((team, teamIndex) => {
          const p = teamPalettes[teamIndex % teamPalettes.length];
          const card = document.createElement("div");
          card.className = "team-card";
          card.style.background = p.card;
          card.style.borderColor = p.border;

          const header = document.createElement("div");
          header.className = "team-header";
          header.style.background = p.head;
          header.innerHTML =
            "<span>⚽ Team " +
            (teamIndex + 1) +
            "</span><span>" +
            team.length +
            " player" +
            (team.length === 1 ? "" : "s") +
            "</span>";

          const body = document.createElement("div");
          body.className = "team-body";
          team.forEach((player, i) => {
            const row = document.createElement("div");
            row.className = "player";
            row.innerHTML =
              '<span class="num" style="background:' +
              p.badgeBg +
              ";color:" +
              p.badgeText +
              ';">' +
              (i + 1) +
              "</span>" +
              "<span>" +
              player +
              "</span>";
            body.appendChild(row);
          });

          card.appendChild(header);
          card.appendChild(body);
          teamsWrap.appendChild(card);
        });

        lineupTitle.style.display = "block";
        summary.style.display = "block";
        const total = teams.reduce((sum, t) => sum + t.length, 0);
        const average = Math.ceil(total / teams.length);
        summary.textContent = "👥 " + total + " players • 🏆 " + teams.length + " teams • 📊 ~" + average + " per team";
        reshuffleBtn.style.display = "inline-block";
        resetBtn.style.display = "inline-block";
      }

      function resetAll() {
        numTeamsInput.value = "";
        playerNamesInput.value = "";
        teamsWrap.innerHTML = "";
        lineupTitle.style.display = "none";
        summary.style.display = "none";
        reshuffleBtn.style.display = "none";
        resetBtn.style.display = "none";
        showError("");
        updateHint();
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        showError("");

        const teamCount = Number.parseInt(numTeamsInput.value, 10);
        if (Number.isNaN(teamCount) || teamCount < 2) {
          showError("Please enter at least 2 teams.");
          return;
        }
        if (teamCount > 10) {
          showError("Maximum 10 teams allowed.");
          return;
        }

        const players = parsePlayers(playerNamesInput.value);
        if (players.length < teamCount) {
          showError("You need at least " + teamCount + " players for " + teamCount + " teams.");
          return;
        }

        renderTeams(divideTeams(players, teamCount));
      });

      reshuffleBtn.addEventListener("click", () => {
        const teamCount = Number.parseInt(numTeamsInput.value, 10);
        const players = parsePlayers(playerNamesInput.value);
        if (!Number.isNaN(teamCount) && teamCount >= 2 && players.length >= teamCount) {
          showError("");
          renderTeams(divideTeams(players, teamCount));
        }
      });

      resetBtn.addEventListener("click", resetAll);
      playerNamesInput.addEventListener("input", updateHint);

      updateHint();
    </script>
  </body>
</html>
